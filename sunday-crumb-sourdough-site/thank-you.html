<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Sunday Crumb Sourdough Co</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="section">
      <div class="container" style="max-width: 760px; text-align: center">
        <div class="order-card" style="padding: 2rem">
          <img
            src="logo.jpg"
            alt="Sunday Crumb Sourdough Co logo"
            style="
              width: 120px;
              height: 120px;
              border-radius: 50%;
              margin: 0 auto 1rem;
              object-fit: cover;
            "
          />
          <div class="eyebrow">Thank You</div>
          <h1
            style="
              font-family: &quot;Cormorant Garamond&quot;, serif;
              font-size: clamp(2.8rem, 5vw, 4rem);
              margin: 0 0 1rem;
              color: var(--brown);
            "
          >
            Your order has been submitted!
          </h1>
          <p style="line-height: 1.75; font-size: 1.05rem">
            Thank you for contacting Sunday Crumb Sourdough Co. A confirmation
            email should be sent to the business inbox with your order details.
          </p>
          <article class="menu-item">
            <h3>Order number# 123456</h3>
          </article>
          <div class="thankyou-social">
            <p>Follow our latest post</p>

            <a
              href="https://www.instagram.com/sundaycrumbsourdoughco"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Instagram"
            >
              <i class="fab fa-instagram"></i>
              <span>@SundayCrumbSourdoughCo</span>
            </a>
          </div>

          <a href="index.html" class="btn btn-primary" style="margin-top: 1rem"
            >Back to Home</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
